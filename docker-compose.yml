services:
  frontend:
    build:
      context: ./frontend
    container_name: nextjs-app
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./frontend/.env
    networks:
      - internal_net
    restart: unless-stopped
    volumes:
      - fileuploads-data:/app/fileuploads
      - fileborrows-data:/app/fileborrows
      - filerequisitions-data:/app/filerequisitions

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - fileuploads-data:/app/fileuploads
      - fileborrows-data:/app/fileborrows
      - filerequisitions-data:/app/filerequisitions
    depends_on:
      - frontend
    networks:
      - internal_net
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: unless-stopped
    ports:
      - "3306:3306"

    # ✅ ใช้ .env ระดับ root (มี DB_* ของคุณอยู่แล้ว)
    env_file:
      - ./.env

    # ✅ map ชื่อ env ให้ MySQL รู้จัก (สำคัญ!)
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME:-media}
      MYSQL_USER: ${DB_USER:-myuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}

    volumes:
      - db-data:/var/lib/mysql
    networks:
      - internal_net

    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin-service
    environment:
      PMA_HOST: db
    ports:
      - "8080:80"
    networks:
      - internal_net
    restart: unless-stopped

volumes:
  db-data:
  fileuploads-data:
    name: fileuploads-data
  fileborrows-data:
    name: fileborrows-data
  filerequisitions-data:
    name: filerequisitions-data

networks:
  internal_net:
    driver: bridge
